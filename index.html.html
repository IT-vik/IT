<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-викторина 20 секунд</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #f0f7f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app {
            max-width: 780px;
            width: 100%;
            background: white;
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 20px 40px rgba(0, 60, 30, 0.12), 0 8px 16px rgba(0, 40, 20, 0.06);
            padding: 38px 32px 42px;
            transition: all 0.2s ease;
            border: 1px solid #cde8d0;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: #1e7e34;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.5px;
            box-shadow: 0 4px 8px rgba(30, 126, 52, 0.2);
        }

        .logo h1 {
            font-weight: 600;
            font-size: 26px;
            letter-spacing: -0.3px;
            color: #0f4020;
        }

        .timer-block {
            background: #ebf7ec;
            padding: 8px 22px 8px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #b8dfbe;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .timer-icon {
            font-size: 22px;
            line-height: 1;
        }

        .timer {
            font-weight: 600;
            font-size: 24px;
            letter-spacing: 1px;
            color: #0a3a1a;
            background: white;
            padding: 2px 14px 2px 12px;
            border-radius: 40px;
            border: 1px solid #b1d9b6;
            min-width: 86px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px 8px 12px;
        }

        .home-screen .illustration {
            font-size: 82px;
            margin-bottom: 18px;
            line-height: 1;
            filter: drop-shadow(0 8px 12px rgba(30, 100, 50, 0.08));
        }

        .home-screen h2 {
            font-size: 34px;
            font-weight: 600;
            color: #0d4720;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .home-screen p {
            font-size: 18px;
            color: #2f5f3a;
            max-width: 420px;
            margin: 0 auto 28px;
            line-height: 1.5;
            background: #f2fbf3;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #d2edd6;
        }

        .btn-primary {
            background: #1e8a38;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 22px;
            padding: 18px 60px;
            border-radius: 60px;
            box-shadow: 0 8px 0 #0f5522, 0 10px 24px rgba(26, 110, 44, 0.25);
            cursor: pointer;
            transition: all 0.08s linear;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            border: 1px solid #2d9e48;
        }

        .btn-primary:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f5522, 0 10px 20px rgba(26, 110, 44, 0.2);
        }

        .btn-primary:hover {
            background: #21963e;
            box-shadow: 0 8px 0 #0f5522, 0 12px 28px rgba(26, 110, 44, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.65;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0f5522;
            pointer-events: none;
        }

        .btn-secondary {
            background: #eaf5ec;
            border: 1px solid #b1d9b8;
            color: #11522a;
            font-weight: 600;
            font-size: 18px;
            padding: 14px 36px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 4px rgba(0, 40, 10, 0.04);
        }

        .btn-secondary:hover {
            background: #ddf0e0;
            border-color: #7fc289;
            box-shadow: 0 4px 8px rgba(0, 60, 20, 0.06);
        }

        .btn-secondary:active {
            transform: scale(0.97);
        }

        .quiz-screen {
            display: none;
            animation: fadeUp 0.2s ease;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: #f2fbf4;
            padding: 10px 18px 10px 22px;
            border-radius: 60px;
            border: 1px solid #c7e3cc;
        }

        .question-counter {
            font-weight: 500;
            color: #1c5a2c;
            font-size: 17px;
            background: white;
            padding: 3px 18px 3px 16px;
            border-radius: 40px;
            border: 1px solid #b7ddbe;
        }

        .question-text {
            font-size: 26px;
            font-weight: 600;
            color: #0b4020;
            margin: 10px 0 28px;
            line-height: 1.3;
            padding-left: 4px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 36px;
        }

        .option-item {
            background: #f7fcf8;
            border: 2px solid #d2ead6;
            border-radius: 60px;
            padding: 16px 28px;
            font-size: 19px;
            font-weight: 500;
            color: #124b24;
            cursor: pointer;
            transition: all 0.08s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 4px rgba(0, 30, 10, 0.02);
        }

        .option-item:hover:not(.disabled-option) {
            background: #e6f6e9;
            border-color: #6fb87b;
            transform: scale(1.01);
        }

        .option-item.selected {
            background: #d5f0da;
            border-color: #1f8a3b;
            box-shadow: 0 0 0 3px rgba(30, 130, 50, 0.15);
        }

        .option-item.correct-reveal {
            background: #c6edce;
            border-color: #0f7a2b;
        }

        .option-item.wrong-reveal {
            background: #fce3e3;
            border-color: #d45a5a;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 40px;
            width: 36px;
            height: 36px;
            font-weight: 700;
            color: #0e4f22;
            border: 1px solid #add6b4;
            flex-shrink: 0;
        }

        .option-item.selected .option-letter {
            background: #1e8a38;
            color: white;
            border-color: #1e8a38;
        }

        .disabled-option {
            cursor: default;
            opacity: 0.85;
        }

        .quiz-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 6px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .result-message {
            font-weight: 500;
            color: #0f4f24;
            background: #e9f6ec;
            padding: 8px 22px;
            border-radius: 60px;
            border: 1px solid #badec0;
            font-size: 17px;
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 24px 6px 12px;
            animation: fadeUp 0.25s ease;
        }

        .result-screen .big-icon {
            font-size: 76px;
            margin-bottom: 16px;
        }

        .result-screen h2 {
            font-size: 32px;
            font-weight: 600;
            color: #0d4720;
            margin-bottom: 6px;
        }

        .result-score {
            font-size: 56px;
            font-weight: 700;
            color: #146d2c;
            background: #e7f5ea;
            display: inline-block;
            padding: 4px 40px;
            border-radius: 80px;
            margin: 12px 0 18px;
            border: 1px solid #b1dbb8;
        }

        .result-detail {
            font-size: 18px;
            color: #1e5830;
            margin-bottom: 28px;
        }

        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 550px) {
            .app { padding: 24px 16px; }
            .header { flex-direction: column; align-items: stretch; }
            .logo h1 { font-size: 22px; }
            .timer-block { justify-content: center; }
            .question-text { font-size: 22px; }
            .option-item { padding: 14px 20px; font-size: 17px; }
            .btn-primary { width: 100%; justify-content: center; padding: 16px 20px; }
        }
    </style>
</head>
<body>
<div class="app" id="appContainer">
    <!-- шапка с таймером -->
    <div class="header">
        <div class="logo">
            <span class="logo-icon">IT</span>
            <h1>Викторина</h1>
        </div>
        <div class="timer-block">
            <span class="timer-icon">⏳</span>
            <span class="timer" id="timerDisplay">00:20</span>
        </div>
    </div>

    <!-- ГЛАВНАЯ СТРАНИЦА -->
    <div id="homeScreen" class="home-screen">
        <div class="illustration">💻⚡</div>
        <h2>IT-квиз</h2>
        <p>8 вопросов · 20 секунд · проверь свои знания</p>
        <button class="btn-primary" id="startQuizBtn">▶ Пройти викторину</button>
        <div style="margin-top: 28px; font-size: 15px; color: #427a4b;"># технологический вызов</div>
    </div>

    <!-- ЭКРАН ВИКТОРИНЫ -->
    <div id="quizScreen" class="quiz-screen">
        <div class="progress-area">
            <span class="question-counter" id="questionCounter">1 / 8</span>
            <span style="color: #1d6932; font-weight: 500;" id="questionTag">Вопрос</span>
        </div>
        <div class="question-text" id="questionText">Загрузка вопроса...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div class="quiz-footer">
            <span id="feedbackMessage" class="result-message"></span>
            <button class="btn-secondary" id="nextQuestionBtn" disabled>Далее →</button>
        </div>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТОВ -->
    <div id="resultScreen" class="result-screen">
        <div class="big-icon">🏆</div>
        <h2>Викторина завершена!</h2>
        <div class="result-score" id="resultScore">0 / 8</div>
        <div class="result-detail" id="resultDetail">Отличная работа!</div>
        <div class="btn-group">
            <button class="btn-primary" id="retryQuizBtn">🔄 Пройти снова</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ------ ВОПРОСЫ (8 штук) ------
        const QUESTIONS = [
            {
                question: 'Что означает аббревиатура "HTML"?',
                options: ['Hyper Text Markup Language', 'High Tech Modern Language', 'Hyper Transfer Markup Language', 'Home Tool Markup Language'],
                correct: 0
            },
            {
                question: 'Какой язык используется для стилизации веб-страниц?',
                options: ['JavaScript', 'Python', 'CSS', 'PHP'],
                correct: 2
            },
            {
                question: 'Какая структура данных работает по принципу "последним пришёл — первым ушёл" (LIFO)?',
                options: ['Очередь', 'Стек', 'Список', 'Дерево'],
                correct: 1
            },
            {
                question: 'Какой протокол используется для безопасной передачи данных в интернете?',
                options: ['HTTP', 'FTP', 'HTTPS', 'SSH'],
                correct: 2
            },
            {
                question: 'В каком году был выпущен первый iPhone?',
                options: ['2005', '2007', '2009', '2010'],
                correct: 1
            },
            {
                question: 'Что такое "API"?',
                options: ['Интерфейс прикладного программирования', 'Алгоритм поиска информации', 'Автоматическая программа индексации', 'Ассемблерный интерфейс'],
                correct: 0
            },
            {
                question: 'Какой язык программирования чаще всего используется для машинного обучения?',
                options: ['Java', 'C++', 'Python', 'Ruby'],
                correct: 2
            },
            {
                question: 'Что означает "404" в контексте веб-страниц?',
                options: ['Страница не найдена', 'Внутренняя ошибка сервера', 'Доступ запрещён', 'Перенаправление'],
                correct: 0
            }
        ];

        // ------ СОСТОЯНИЕ ------
        let currentQuestionIndex = 0;
        let userAnswers = new Array(8).fill(null);
        let quizFinished = false;
        let timerInterval = null;
        let timeSeconds = 20; // 20 секунд
        let isQuizActive = false;

        // DOM
        const homeScreen = document.getElementById('homeScreen');
        const quizScreen = document.getElementById('quizScreen');
        const resultScreen = document.getElementById('resultScreen');
        const startBtn = document.getElementById('startQuizBtn');
        const retryBtn = document.getElementById('retryQuizBtn');
        const nextBtn = document.getElementById('nextQuestionBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const questionCounter = document.getElementById('questionCounter');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackMessage = document.getElementById('feedbackMessage');
        const resultScore = document.getElementById('resultScore');
        const resultDetail = document.getElementById('resultDetail');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(timeSeconds);
            if (timeSeconds <= 5) {
                timerDisplay.style.color = '#b13e3e';
            } else {
                timerDisplay.style.color = '#0a3a1a';
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimer() {
            if (timerInterval) stopTimer();
            timerInterval = setInterval(() => {
                if (timeSeconds <= 0) {
                    stopTimer();
                    if (!quizFinished && isQuizActive) {
                        finishQuiz(true);
                    }
                    return;
                }
                timeSeconds--;
                updateTimerDisplay();
            }, 1000);
        }

        function renderQuestion(index) {
            const q = QUESTIONS[index];
            questionText.textContent = q.question;
            questionCounter.textContent = `${index + 1} / ${QUESTIONS.length}`;

            const letters = ['A', 'B', 'C', 'D'];
            let html = '';
            q.options.forEach((opt, idx) => {
                const selectedClass = (userAnswers[index] === idx) ? 'selected' : '';
                html += `
                    <div class="option-item ${selectedClass}" data-opt-index="${idx}">
                        <span class="option-letter">${letters[idx]}</span>
                        <span>${opt}</span>
                    </div>
                `;
            });
            optionsContainer.innerHTML = html;

            document.querySelectorAll('.option-item').forEach(el => {
                el.classList.remove('correct-reveal', 'wrong-reveal', 'disabled-option');
            });

            const selected = userAnswers[index];
            if (selected !== null) {
                document.querySelectorAll('.option-item').forEach(el => {
                    el.classList.add('disabled-option');
                });
                if (!quizFinished) {
                    const isCorrect = (selected === q.correct);
                    feedbackMessage.textContent = isCorrect ? '✅ Верно!' : '❌ Неверно';
                    document.querySelectorAll('.option-item').forEach(el => {
                        const optIdx = parseInt(el.dataset.optIndex);
                        if (optIdx === q.correct) {
                            el.classList.add('correct-reveal');
                        } else if (optIdx === selected && optIdx !== q.correct) {
                            el.classList.add('wrong-reveal');
                        }
                    });
                } else {
                    feedbackMessage.textContent = '';
                }
            } else {
                feedbackMessage.textContent = '';
                document.querySelectorAll('.option-item').forEach(el => {
                    el.classList.remove('disabled-option');
                });
            }

            const isLast = (index === QUESTIONS.length - 1);
            nextBtn.textContent = isLast ? 'Завершить' : 'Далее →';
            nextBtn.disabled = (userAnswers[index] === null);
        }

        function onOptionClick(e) {
            const target = e.target.closest('.option-item');
            if (!target) return;
            if (quizFinished || !isQuizActive) return;
            const index = currentQuestionIndex;
            if (userAnswers[index] !== null) return;

            const optIndex = parseInt(target.dataset.optIndex);
            if (isNaN(optIndex)) return;

            userAnswers[index] = optIndex;
            renderQuestion(index);
        }

        function finishQuiz(forceTimeout = false) {
            if (quizFinished) return;
            quizFinished = true;
            isQuizActive = false;
            stopTimer();

            document.querySelectorAll('.option-item').forEach(el => {
                el.classList.add('disabled-option');
            });
            nextBtn.disabled = true;

            let correctCount = 0;
            QUESTIONS.forEach((q, idx) => {
                if (userAnswers[idx] === q.correct) correctCount++;
            });

            homeScreen.classList.add('hidden');
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';

            resultScore.textContent = `${correctCount} / ${QUESTIONS.length}`;
            let detailText = '';
            if (correctCount === 8) detailText = '⭐ Идеально! Ты IT-гуру!';
            else if (correctCount >= 6) detailText = '🔥 Отлично! Ты хорошо разбираешься!';
            else if (correctCount >= 4) detailText = '📚 Неплохо, но есть куда расти!';
            else detailText = '💡 Попробуй ещё раз, подтяни знания!';
            if (forceTimeout) {
                detailText += ' ⏰ Время вышло!';
            }
            resultDetail.textContent = detailText;
        }

        function onNextClick() {
            if (quizFinished || !isQuizActive) return;
            if (userAnswers[currentQuestionIndex] === null) return;

            if (currentQuestionIndex === QUESTIONS.length - 1) {
                finishQuiz(false);
                return;
            }

            currentQuestionIndex++;
            renderQuestion(currentQuestionIndex);
            const quizScreenEl = document.getElementById('quizScreen');
            if (quizScreenEl) quizScreenEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resetAndStartQuiz() {
            stopTimer();
            currentQuestionIndex = 0;
            userAnswers.fill(null);
            quizFinished = false;
            isQuizActive = true;
            timeSeconds = 20;
            updateTimerDisplay();
            timerDisplay.style.color = '#0a3a1a';

            homeScreen.classList.add('hidden');
            resultScreen.style.display = 'none';
            quizScreen.style.display = 'block';

            renderQuestion(0);
            feedbackMessage.textContent = '';
            startTimer();
            nextBtn.disabled = true;
        }

        function onStartClick() {
            resetAndStartQuiz();
        }

        function onRetryClick() {
            resetAndStartQuiz();
        }

        function init() {
            homeScreen.classList.remove('hidden');
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            updateTimerDisplay();

            startBtn.addEventListener('click', onStartClick);
            retryBtn.addEventListener('click', onRetryClick);
            nextBtn.addEventListener('click', onNextClick);
            optionsContainer.addEventListener('click', onOptionClick);
        }

        init();
    })();
</script>
</body>
</html>
